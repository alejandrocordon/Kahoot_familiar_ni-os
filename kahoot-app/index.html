  const rm=S.sr?`<div style="text-align:center;margin-top:10px;font-size:15px;font-weight:800;animation:popIn .3s ease-out;color:${S.sl===q.c?'#2ecc71':'#e74c3c'}">${S.sl===q.c?`¡Correcto! +${S.tl>S.mt*2/3?1000:S.tl>S.mt/3?750:500} 🎉`:S.sl===null?'⏰ ¡Tiempo!':'Era "'+q.o[q.c]+'" 😅'}</div>`:"";

  // Scoreboard - compact for many players
  const sbStyle=S.np>4?"font-size:11px;gap:6px":"font-size:13px;gap:12px";
  const sb=S.nm.map((n,i)=>`<div style="font-weight:800;opacity:${S.ct===i?1:.3};color:${S.ct===i?ac:'inherit'};transition:all .3s;white-space:nowrap">${PE[i]} ${n.split(' ')[0]}: ${S.sc2[i]}</div>`).join("");

  const _wpTh=S.th==="rnd"?(q._t||null):S.th;const _wp2=gWP(_wpTh);
  app.innerHTML=`<div class="ct ${thC}"${_wp2?` style="--wp-url:${_wp2}"`:''}>${P(S.th==="rnd"?(q._t||"menu"):S.th)}<div style="z-index:1;width:100%;max-width:540px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">
      <div style="font-size:12px;opacity:.4;font-weight:700">${S.cq+1}/${S.qs.length} ${thTag}</div>
      <div style="background:${PC[S.ct]}33;border:1px solid ${PC[S.ct]}66;border-radius:14px;padding:2px 10px;font-size:12px;font-weight:800;color:${PC[S.ct]}">${PE[S.ct]} ${S.nm[S.ct]}</div>
    </div>
    <div style="display:flex;justify-content:center;flex-wrap:wrap;margin-bottom:6px;${sbStyle}">${sb}</div>
    <div style="width:100%;height:6px;background:rgba(${dk?'255,255,255':'0,0,0'},.08);border-radius:3px;margin-bottom:10px;overflow:hidden"><div style="height:100%;width:${pc}%;background:${tc};border-radius:3px;transition:width 1s linear,background .5s" id="tb"></div></div>
    <div class="cd" style="text-align:center;margin-bottom:10px;border:${dk?'1px solid rgba(255,255,255,.08)':'3px solid #ffe0e0'};background:${dk?'rgba(255,255,255,.06)':'#fff'};position:relative">
      <div style="font-size:11px;margin-bottom:3px;color:${ac};font-weight:800">${"⭐".repeat(q.d)}</div>
      <div style="font-size:clamp(15px,3.5vw,20px);font-weight:800;line-height:1.3;padding-right:32px">${q.q}</div>
      <div id="tn" style="position:absolute;top:8px;right:12px;font-size:22px;font-weight:900;color:${tc};font-family:'Fredoka';${S.tl<=5?'animation:shake .3s infinite':''}">${S.tl}</div>
    </div>
    <div class="ag">${ans}</div>${rm}
  </div></div>`;

} else if(S.sc==="end"){
  const ac=t?t.a:"#ffd700";
  const thC=S.th==="rnd"?"t-mn":(t?t.c:"t-mn");
  const tf=t?t.f:"'Fredoka',sans-serif";
  const co=t?t.co:["#e74c3c","#3b82f6","#f39c12","#2ecc71"];

  // Rank players by score descending
  const ranked=S.nm.map((n,i)=>({n,s:S.sc2[i],i})).sort((a,b)=>b.s-a.s);
  const topScore=ranked[0].s;
  const winners=ranked.filter(r=>r.s===topScore);
  const winText=winners.length>1?(S.np===1?"¡Partida terminada!":"¡Empate!"):`¡${winners[0].n} gana!`;
  const medals=["🥇","🥈","🥉"];

  const cf=S.cl?`<div class="pp">${Array.from({length:30}).map((_,i)=>`<div style="position:absolute;left:${Math.random()*100}%;top:-20px;width:${Math.random()*12+5}px;height:${Math.random()*12+5}px;background:${co[i%4]};border-radius:${Math.random()>.5?'50%':'3px'};animation:confetti ${Math.random()*3+2}s linear infinite;animation-delay:${Math.random()*2}s"></div>`).join("")}</div>`:"";

  // Ranking list
  let rankHTML="";
  let prevScore=-1,prevRank=0;
  ranked.forEach((r,idx)=>{
    const rank=r.s===prevScore?prevRank:idx;
    prevScore=r.s;prevRank=rank;
    const medal=rank<3?medals[rank]:(rank+1)+"º";
    const isTop=rank===0;
    const bg=isTop?"rgba(255,215,0,.15)":"rgba(255,255,255,.05)";
    const bd=isTop?`2px solid ${ac}`:"1px solid rgba(255,255,255,.08)";
    const sz=isTop?"font-size:22px":"font-size:18px";
    rankHTML+=`<div style="display:flex;align-items:center;gap:10px;background:${bg};border:${bd};border-radius:14px;padding:10px 14px;animation:popIn .4s ease-out ${idx*.1}s both">
      <span style="font-size:${isTop?'24px':'18px'};width:36px;text-align:center">${medal}</span>
      <span style="font-size:14px">${PE[r.i]}</span>
      <span style="flex:1;font-weight:700;font-size:14px">${r.n}</span>
      <span style="${sz};font-weight:900;color:${isTop?ac:'inherit'};font-family:'Fredoka'">${r.s}</span>
    </div>`;
  });

  const _wp3=gWP(S.th==="rnd"?null:S.th);
  app.innerHTML=`<div class="ct ${thC}"${_wp3?` style="--wp-url:${_wp3}"`:''}>${P(S.th==="rnd"?"menu":(S.th||"menu"))}${cf}<div style="z-index:1;text-align:center;max-width:460px;width:100%;animation:popIn .6s ease-out">
    <div style="font-size:56px;margin-bottom:4px;animation:float 2s ease-in-out infinite">${S.np===1?"🎯":"🏆"}</div>
    <h1 style="font-family:${tf};font-size:clamp(20px,5vw,32px);color:${ac};margin-bottom:14px">${winText}</h1>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px;text-align:left">${rankHTML}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="bt" onclick="pA()" style="background:${ac};color:#1a1a2e;font-size:15px">Otra ronda 🔄</button>
      <button class="bt" onclick="rst()" style="background:rgba(255,255,255,.1);color:${ac};border:2px solid ${ac}33;font-size:15px">Temas 🎮</button>
    </div>
  </div></div>`;
}}
R();
</script>
